{% extends 'base.html' %}
{% block page_title %}Documents & AI{% endblock %}
{% block content %}
<div class="card">
  <div class="card-head">
    <div>
      <div class="eyebrow">Knowledge base</div>
      <h2 class="card-title">Upload a document</h2>
    </div>
    <span class="pill ghost">PDF · DOC · DOCX · TXT</span>
  </div>

  <form id="uploadForm" enctype="multipart/form-data" class="dropzone">
    <label for="fileInput" class="dz-inner">
      <div class="dz-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M17 8l-5-5-5 5"></path><path d="M12 3v12"></path></svg>
      </div>
      <div class="dz-title">Drag & drop or <span>click to browse</span></div>
      <div class="dz-sub">We'll extract, summarize, and generate quizzes with AI</div>
      <input type="file" id="fileInput" name="file" accept=".pdf,.txt,.doc,.docx" hidden>
    </label>
    <div class="dz-actions">
      <button type="submit" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"></path><path d="M5 12l7-7 7 7"></path></svg>
        Upload & analyze
      </button>
    </div>
  </form>
</div>

<div class="card">
  <div class="card-head">
    <div>
      <div class="eyebrow">Library</div>
      <h2 class="card-title">Your documents</h2>
    </div>
  </div>
  <div id="documentList" class="doc-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/uploads.js"></script>
{% endblock %}
